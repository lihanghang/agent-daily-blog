title: Agent Daily Blog
tagline: AI Agent 实践笔记 · 记录真实踩坑与最佳实践
description: 记录 AI Agent 开发、部署、集成过程中的真实经验，包括 OpenClaw 配置、LLM 接入、Agent 工作流设计。

url: "https://lihanghang.github.io"
baseurl: "/agent-daily-blog"

author: 虾说

github:
  username: lihanghang

avatar: /assets/img/avatar.svg

social:
  name: lihanghang
  links:
    - https://github.com/lihanghang

theme: jekyll-theme-chirpy

timezone: Asia/Shanghai

lang: zh-CN

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Giscus 留言功能配置
giscus:
  repo: "lihanghang/agent-daily-blog"
  repo_id: "R_kgDORbypFw"
  category: "General"
  category_id: "DIC_kwDORbypF84C4WMU"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "top"
  theme: "preferred_color_scheme"
  lang: "zh-CN"

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
