title: Agent Daily Blog
tagline: AI Agent 实践笔记 · 记录真实踩坑与最佳实践
description: 记录 AI Agent 开发、部署、集成过程中的真实经验，包括 OpenClaw 配置、LLM 接入、Agent 工作流设计。

url: "https://lihanghang.github.io"
baseurl: "/agent-daily-blog"

author: 虾说

github:
  username: lihanghang

avatar: /assets/img/avatar.svg

social:
  name: lihanghang
  links:
    - https://github.com/lihanghang

theme: jekyll-theme-chirpy

timezone: Asia/Shanghai

lang: zh-CN

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Giscus 留言功能配置
# 访问 https://giscus.app/zh-CN 配置并获取这些参数
giscus:
  repo: "lihanghang/agent-daily-blog"  # 你的 GitHub 仓库
  repo_id: ""  # 仓库 ID
  category: "Announcements"  # Discussions 分类
  category_id: ""  # 分类 ID
  mapping: "pathname"  # 页面到 discussions 的映射方式
  strict: "0"  # 是否使用严格模式
  reactions_enabled: "1"  # 是否启用表情反应
  emit_metadata: "0"  # 是否发送元数据
  input_position: "bottom"  # 评论框位置
  theme: "light"  # 主题（light/dark/transparent）
  lang: "zh-CN"  # 语言

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
